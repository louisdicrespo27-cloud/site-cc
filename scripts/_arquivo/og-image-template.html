<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex,nofollow" />
<title>OG Image Template — não publicar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #faf8f6;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-accent {
    position: absolute;
    top: 0; right: 0;
    width: 420px; height: 420px;
    background: radial-gradient(circle at top right,
      rgba(92,24,41,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .bg-accent2 {
    position: absolute;
    bottom: 0; left: 0;
    width: 300px; height: 300px;
    background: radial-gradient(circle at bottom left,
      rgba(28,26,24,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .border-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #5c1829;
  }
  .card {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
    padding: 72px 96px;
    width: 100%;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-mark {
    width: 44px; height: 44px;
    border: 2px solid #5c1829;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { display: block; }
  .logo-text { line-height: 1.2; }
  .logo-name {
    font-family: system-ui, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #1c1a18;
    text-transform: uppercase;
  }
  .logo-sub {
    font-family: system-ui, sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(28,26,24,0.55);
    text-transform: uppercase;
  }
  .headline {
    font-size: 52px;
    font-weight: 400;
    line-height: 1.15;
    color: #1c1a18;
    max-width: 700px;
  }
  .headline em {
    font-style: italic;
    color: #5c1829;
  }
  .tags {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tag {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: rgba(28,26,24,0.65);
    border: 1px solid rgba(28,26,24,0.15);
    border-radius: 999px;
    padding: 5px 14px;
    letter-spacing: 0.02em;
  }
  .location {
    font-family: system-ui, sans-serif;
    font-size: 13px;
    color: rgba(28,26,24,0.45);
    letter-spacing: 0.05em;
    position: absolute;
    bottom: 44px;
    right: 96px;
  }
</style>
</head>
<body>
  <div class="bg-accent"></div>
  <div class="bg-accent2"></div>
  <div class="border-top"></div>

  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 34 34" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <rect width="34" height="34" rx="4" fill="none"/>
          <text x="17" y="24" text-anchor="middle"
                font-family="Georgia,serif" font-size="20"
                fill="#5c1829">C</text>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Correia Crespo</div>
        <div class="logo-sub">Advogados</div>
      </div>
    </div>

    <h1 class="headline">
      Advogados na <em>Lourinhã</em><br>e no Litoral Oeste
    </h1>

    <div class="tags">
      <span class="tag">Família e menores</span>
      <span class="tag">Imobiliário e arrendamento</span>
      <span class="tag">Cobrança e insolvência</span>
    </div>
  </div>

  <div class="location">correiacrespo-advogados.pt</div>
</body>
</html>
